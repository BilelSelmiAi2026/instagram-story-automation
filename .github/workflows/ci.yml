name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-checks:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -m nltk.downloader punkt punkt_tab

      - name: Check Python syntax
        run: |
          python -m compileall \
            main.py \
            config.py \
            src \
            test_rss.py \
            test_article_extractor.py \
            test_article_image_extractor.py \
            test_cloudinary_uploader.py \
            test_instagram_publisher.py

      - name: Verify important imports
        run: |
          python -c "import cloudinary"
          python -c "import feedparser"
          python -c "import nltk"
          python -c "import requests"
          python -c "import sumy"
          python -c "import trafilatura"
          python -c "from PIL import Image"
          python -c "from wand.image import Image"

      - name: Run offline summarizer smoke test
        run: |
          python - <<'PY'
          from src.summarizers.summarizer_factory import SummarizerFactory

          text = (
              "Artificial intelligence helps companies automate work. "
              "Text summarization reduces long documents into shorter versions. "
              "Extractive algorithms select important sentences from the source. "
              "These systems are useful for news and social media applications."
          )

          for algorithm in ("textrank", "kl", "sumbasic"):
              summarizer = SummarizerFactory.create(
                  algorithm=algorithm,
                  language="english",
              )

              summary = summarizer.summarize(
                  text=text,
                  sentence_count=2,
              )

              if not summary.strip():
                  raise RuntimeError(
                      f"{algorithm} returned an empty summary."
                  )

              print(f"{algorithm}: {summary}")
          PY

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build \
            --tag instagram-story-bot:ci \
            .