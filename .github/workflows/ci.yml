name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -m nltk.downloader punkt punkt_tab

      - name: Check Python syntax
        run: |
          python -m compileall main.py config.py src

      - name: Verify imports
        run: |
          python -c "import feedparser"
          python -c "import nltk"
          python -c "import sumy"
          python -c "import cloudinary"
          python -c "from wand.image import Image"